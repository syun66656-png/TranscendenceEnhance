name: TranscendenceEnhance
version: 1.0.0
main: com.transcendence.enhance.TranscendenceEnhancePlugin
api-version: "1.20"
author: CursorAI
description: Tool transcendence enhancement plugin
commands:
  transcendence:
    description: Open transcendence GUI or give stones
    usage: /transcendence | /transcendence give <amount> | /transcendence give <player> [amount]
    aliases: [te, transcend]
permissions:
  transcendence.use:
    default: true
  transcendence.admin:
    default: op
